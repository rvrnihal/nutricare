name: nuticare
description: NUTRICARE+ demo (styled UI)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=2.18.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  shared_preferences: ^2.1.1
  flutter_local_notifications: ^17.2.4
  uuid: ^4.5.2
  intl: ^0.18.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.5.0
  firebase_database: ^11.3.0
  firebase_storage: ^12.1.0
  http: ^1.2.0
  fl_chart: ^1.1.1
  speech_to_text: ^6.6.0
  google_maps_flutter: ^2.6.0
  firebase_messaging: ^15.0.0
  google_mlkit_text_recognition: ^0.13.0
  image_picker: ^1.0.7
  timezone: ^0.9.2
