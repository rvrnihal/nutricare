  health: 13.1.1
  url_launcher: ^6.2.6
  audioplayers: ^5.2.1
  geolocator: ^10.1.0
  provider: ^6.1.1
  google_fonts: ^6.1.0
  percent_indicator: ^4.2.3
  animations: ^2.0.11
  share_plus: ^12.0.1
  file_picker: ^8.0.0
  pdfx: ^2.4.2





dev_dependencies:
